<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        class Deportista{
            constructor(name, lastname){
                this.name = name
                this.lastname = lastname
            }
        }

        class Futbolista extends Deportista{
            constructor(name, lastname, goals){
                super(name, lastname)
                this._goals = goals
            }
            get goals(){
                return this._goals
            }

            set goals(newGoals){
                this._goals = newGoals
            }
        }
    </script>
</body>
</html>
