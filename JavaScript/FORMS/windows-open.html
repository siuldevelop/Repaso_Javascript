<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
</head>
<body>
    <h5>Funciones Open y Confirmar</h5>

    <form>
        Abrir en otra pestaña
        <input type="button" value="Abir" onclick="abrir()"><br><br>
        Abrir en otra ventana
        <input type="button" value="Abir" onclick="ventana()"><br><br>
        <input type="button" value="Salir" onclick="confirmar()"><br><br>
    </form>

    <script>
        function  abrir(){
            let window = open()
            window.document.write('Soy otra pagina web')
        }
        function ventana(){
            let window = open('','', 'width=400, height=250')
            window.document.write('Soy otra ventana de pagina web')
        }
        function confirmar(){
            let respuesta = confirm('DESEA SALIR DE LA PAGINA?')
            if(respuesta == true){
                window.close()
            } else{
                let window = open('','', 'width=400, height=250')
                window.document.write('Access Allowed: Admin123')
            }
        }
    </script>




</body>
</html>
