<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
</head>
<body>
    <h5>Comentarios</h5>
    <form>
        <p><textarea id="comentarios" rows = "20" cols="40"></textarea></p>
        <input type="button" value="Enviar" onclick="comentar()">
    </form>
    
    <script>
        let area = document.getElementById('comentarios')
        area.style.resize = "none"

        function comentar(){
            let texto =  document.getElementById('comentarios').value
            if (texto.length > 10){
                swal('Comentario es muy largo')
            }else{
                swal('Gracias!')
            }
        }
    </script>
</body>
</html>
