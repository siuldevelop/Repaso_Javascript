<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON</title>
</head>
<body>
    
    <div id="name"> </div>
    <script>
        let JSONDates
        let xhr = new XMLHttpRequest()
        xhr.open('GET','person.json', true)
        xhr.responseType = 'json'
        xhr.onload = function(){
            if(xhr.status === 200){
                JSONDates = xhr.response
                let textElement = document.getElementById('name')
                textElement.textContent = JSONDates.name
            }else{
                //ERROR MESSAGE
            }
        }
        xhr.send()
        //este html es para mostrar el uso de JSON, se hace una petición a un archivo JSON y se muestra el valor de la propiedad "name" en el elemento con id "name"
    </script>

</body>
</html>
